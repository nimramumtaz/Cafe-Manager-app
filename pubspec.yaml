name: cafe_management_app
description: Cafe Management and Ordering App

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  firebase_core: ^3.1.0
  firebase_auth: ^5.3.1
  cloud_firestore: ^5.1.0
  firebase_storage: ^12.1.0
  image_picker: ^1.0.7
  cached_network_image: ^3.4.1
  shared_preferences: ^2.2.2
  sqflite: ^2.3.3+1
